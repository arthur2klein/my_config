set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

set-option -g default-shell /bin/zsh
set-option -g default-command /bin/zsh
set-option -g status on
set-option -g status-interval 1
set-option -g status-justify centre
set-option -g status-left '#[fg=green]#H'
set-option -g status-right '#[fg=yellow]%d %b %R'
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY SSH_AUTH_SOCK XDG_RUNTIME_DIR"

bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R
bind m display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"

bind -n M-H previous-window
bind -n M-L next-window

bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
set -g mouse on
set -g status-keys vi
setw -g mode-keys vi
set-window-option -g pane-base-index 1

bind '&' select-window -t 1
bind 'Ă©' select-window -t 2
bind '"' select-window -t 3
bind "'" select-window -t 4
bind '(' select-window -t 5
bind '-' select-window -t 6
bind 'Ă¨' select-window -t 7
bind '_' select-window -t 8
bind 'Ă§' select-window -t 9
bind 'Ă ' select-window -t 10

bind X confirm-before -p "kill-window #W? (y/n)" kill-window
bind B switch-client -p
bind F switch-client -n
bind Tab switch-client -l

bind t run-shell 'tmux rename-window -t 1 "mainđź’»"; \
                  tmux new-window -t 2 -n "execđźš€"; \
                  tmux new-window -t 3 -n "testđźŽŻ"; \
                  tmux new-window -t 9 -n "noteđź“ť"; \
                  tmux new-window -t 10 -n "editâśŤ";'

bind y run-shell 'tmux rename-window -t 1 "mainđź’»"; \
                  tmux rename-window -t 2 "execđźš€"; \
                  tmux rename-window -t 3 "testđźŽŻ"; \
                  tmux rename-window -t 9 "noteđź“ť"; \
                  tmux rename-window -t 10 "editâśŤ";'


bind Âµ split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind S run-shell 'SESSION="#{b:pane_current_path}"; DIR="#{pane_current_path}"; if ! tmux has-session -t "=$SESSION" 2>/dev/null; then tmux new-session -d -s "$SESSION" -c "$DIR"; tmux rename-window -t "$SESSION:1" "mainđź’»"; tmux new-window -t "$SESSION:2" -n "execđźš€" -c "$DIR"; tmux new-window -t "$SESSION:3" -n "testđźŽŻ" -c "$DIR"; tmux new-window -t "$SESSION:9" -n "noteđź“ť" -c "$DIR"; tmux new-window -t "$SESSION:10" -n "editâśŤ" -c "$DIR"; fi; tmux switch-client -t "$SESSION"'
bind K confirm kill-session

# Git worktree session: prompt for a branch, create branch+worktree if
# needed, copy untracked files over, open it in a templated session.
bind g command-prompt -p "worktree branch:" "run-shell \"~/.config/scripts/tmux_worktree.sh '%%' '#{pane_current_path}'\""

# Quick DB UI popup: opens nvim with DBUI drawer for ad-hoc queries from any pane.
bind Q display-popup -E -w 90% -h 90% "nvim +DBUI"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " -#W-"
set -g @catppuccin_window_current_number "#I"

set -g @catppuccin_enable_icons '1'
set -g @catppuccin_status_left_separator "î‚˛"
set -g @catppuccin_status_right_separator "î‚°"
set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none

set -g set-titles on
set -g base-index 1
set -g pane-base-index 1

run '~/.tmux/plugins/tpm/tpm'
