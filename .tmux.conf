set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

set-option -g default-shell /bin/zsh
set-option -g default-command /bin/zsh
set-option -g status on
set-option -g status-interval 1
set-option -g status-justify absolute-centre
set-option -g status-left '#[fg=green]#H'
set-option -g status-right '#[fg=yellow]%d %b %R'
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY SSH_AUTH_SOCK XDG_RUNTIME_DIR"

bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R
bind m display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"

bind -n M-H previous-window
bind -n M-L next-window

bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."
set -g mouse on
set -g status-keys vi
setw -g mode-keys vi
set-window-option -g pane-base-index 1

bind '&' select-window -t 1
bind 'é' select-window -t 2
bind '"' select-window -t 3
bind "'" select-window -t 4
bind '(' select-window -t 5
bind '-' select-window -t 6
bind 'è' select-window -t 7
bind '_' select-window -t 8
bind 'ç' select-window -t 9
bind 'à' select-window -t 10

bind X confirm-before -p "kill-window #W? (y/n)" kill-window
bind B switch-client -p
bind F switch-client -n
bind Tab switch-client -l

bind t run-shell 'tmux rename-window -t 1 "main💻"; \
                  tmux new-window -t 2 -n "exec🚀"; \
                  tmux new-window -t 3 -n "test🎯"; \
                  tmux new-window -t 9 -n "note📝"; \
                  tmux new-window -t 10 -n "edit✍";'

bind y run-shell 'tmux rename-window -t 1 "main💻"; \
                  tmux rename-window -t 2 "exec🚀"; \
                  tmux rename-window -t 3 "test🎯"; \
                  tmux rename-window -t 9 "note📝"; \
                  tmux rename-window -t 10 "edit✍";'


bind µ split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind S run-shell 'SESSION="#{b:pane_current_path}"; DIR="#{pane_current_path}"; if ! tmux has-session -t "=$SESSION" 2>/dev/null; then tmux new-session -d -s "$SESSION" -c "$DIR"; tmux rename-window -t "$SESSION:1" "main💻"; tmux new-window -t "$SESSION:2" -n "exec🚀" -c "$DIR"; tmux new-window -t "$SESSION:3" -n "test🎯" -c "$DIR"; tmux new-window -t "$SESSION:9" -n "note📝" -c "$DIR"; tmux new-window -t "$SESSION:10" -n "edit✍" -c "$DIR"; fi; tmux switch-client -t "$SESSION"'
bind K confirm kill-session

# Git worktree session: prompt for a branch, create branch+worktree if
# needed, copy untracked files over, open it in a templated session.
# Runs in a popup so its progress output is visible instead of freezing.
bind g command-prompt -p "worktree branch:" "display-popup -E -d '#{pane_current_path}' -w 80% -h 60% \"~/.config/scripts/tmux_worktree.sh '%%'\""

# Remove the current worktree + its session (only when the current
# session sits in a non-default worktree). Asks for confirmation first.
bind G confirm-before -p "remove worktree + session #S? (y/n)" "run-shell \"~/.config/scripts/tmux_worktree_remove.sh '#{pane_current_path}' '#{session_name}'\""

# Quick DB UI popup: opens nvim with DBUI drawer for ad-hoc queries from any pane.
bind Q display-popup -E -w 90% -h 90% "nvim +DBUI"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " -#W-"
set -g @catppuccin_window_current_number "#I"

set -g @catppuccin_enable_icons '1'
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_window_status_style "rounded" # basic, rounded, slanted, custom, or none

set -g set-titles on
set -g base-index 1
set -g pane-base-index 1

run '~/.tmux/plugins/tpm/tpm'

# Optional per-machine healthchecks (DB, rabbit-manager, ...). Active
# only when ~/.config/tmux/healthchecks.conf exists (see
# scripts/tmux_healthcheck.sh and tmux/healthchecks.conf.example). The
# script probes every minute on a self-bootstrapping background daemon
# and caches a colored line; the status bar just reads the cache, so it
# never blocks a redraw nor hammers the services. Appended after tpm so
# the catppuccin theme cannot clobber the segment. status-right-length
# is widened here (default 40 truncates once a few checks are added);
# the window list stays screen-centered thanks to absolute-centre above.
if-shell '[ -r ~/.config/tmux/healthchecks.conf ]' \
  'set -g status-right-length 150 ; set -ag status-right " #(~/.config/scripts/tmux_healthcheck.sh display)"'
